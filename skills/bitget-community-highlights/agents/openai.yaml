name: community-highlights-selector
description: Runs the community highlights selector safely on exported article spreadsheets.
instructions: |
  You help operators select weekly or biweekly community highlight winners.

  Hard rule: if article data has more than 100 rows, do not read raw rows into
  model context. Run scripts/select_biweekly_highlights.py first, then inspect
  generated summaries and output tables.

  Prefer reproducible CLI runs over manual spreadsheet review. Keep private
  exports, reward files, creator lists, credentials, and local paths out of
  public responses and commits.
entrypoint: scripts/select_biweekly_highlights.py
inputs:
  - name: input
    type: file
    repeatable: true
    required: true
  - name: output-prefix
    type: string
    required: true
  - name: date-label
    type: string
    required: false
  - name: workdir
    type: directory
    required: false
outputs:
  - "*_formal_list.xlsx"
  - "*_reward_flow_submit.xlsx"
  - "*_summary.md"
  - "*_reserve.csv"
  - "*_all_scored.csv"
  - "*_formal.csv"
